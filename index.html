<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/MY LOGO new new-01.png">
<title>DentPrice | Abdurahman Badawy</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:'Segoe UI';background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;margin:0}
header{text-align:center;padding:30px}
h1{margin:0;font-size:38px}
section{background:#1e293b;margin:20px;padding:20px;border-radius:15px}
button{padding:8px 12px;border:none;border-radius:8px;background:#22c55e;color:#fff;cursor:pointer}
button.delete{background:#ef4444}
input{padding:6px;margin:5px;border-radius:6px;border:none}
.card{margin:10px 0;padding:10px;background:#334155;border-radius:10px}
.total{margin-top:10px;font-weight:bold;color:#22c55e;white-space:pre-line}
footer{background:#1e293b;padding:30px;text-align:center}
.logo{max-width:120px;display:block;margin:10px auto}
</style>
</head>

<body>

<!-- ✅ عداد الزوار -->
<p id="visitorCount">عدد الزوار: ...</p>

<header>
<h1>Pricing System for Dental Clinic</h1>
</header>

<section>
<h2>الأصول (Assets)</h2>
<div id="assets"></div>
<button onclick="addAsset()">إضافة أصل</button>

أيام العمل: <input id="assetDays" type="number">
ساعات العمل: <input id="assetHours" type="number">

<div class="total" id="assetResult"></div>
</section>

<section>
<h2>التكاليف الشهرية</h2>
<div id="expenses"></div>
<button onclick="addExpense()">إضافة تكلفة</button>

أيام العمل: <input id="expDays" type="number">
ساعات العمل: <input id="expHours" type="number">

<div class="total" id="expenseResult"></div>
</section>

<section>
<h2>الخدمات</h2>
<div id="services"></div>
<button onclick="addService()">إضافة خدمة</button>

<div class="total" id="serviceResult"></div>
<button onclick="generatePDF()">تحميل PDF</button>
</section>

<footer>
<p>© 2026 جميع الحقوق محفوظة</p>
</footer>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCchSXrbSdklZQ7M6qaCOdExGY1mcMNC3E",
  authDomain: "dental-pricing.firebaseapp.com",
  projectId: "dental-pricing",
  storageBucket: "dental-pricing.appspot.com",
  messagingSenderId: "37962180711",
  appId: "1:37962180711:web:a5812e4a344f6981430cc2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== عداد الزوار =====
async function countVisitor() {
  try {
    const ref = db.collection("stats").doc("visits");
    const doc = await ref.get();

    if (!doc.exists) {
      await ref.set({ count: 1 });
    } else {
      await ref.update({ count: doc.data().count + 1 });
    }

    const newDoc = await ref.get();

    document.getElementById("visitorCount").innerText =
      "عدد الزوار: " + newDoc.data().count;

  } catch (e) {
    console.log(e);
    document.getElementById("visitorCount").innerText =
      "خطأ في Firebase";
  }
}

countVisitor();
</script>

<!-- ================= JS SYSTEM ================= -->
<script>
function addAsset(){
let div=document.createElement('div');
div.className='card';
div.innerHTML=`اسم الأصل <input>
السعر <input type='number' class='price'>
العمر <input type='number' class='life'>
% العائد <input type='number' class='roi'>
<button class='delete' onclick='this.parentElement.remove();calcAssets()'>حذف</button>`;
document.getElementById('assets').appendChild(div)
}

function calcAssets(){
let prices=document.querySelectorAll('.price');
let lifes=document.querySelectorAll('.life');
let rois=document.querySelectorAll('.roi');

let yearly=0;

prices.forEach((p,i)=>{
let price=parseFloat(p.value)||0;
let life=parseFloat(lifes[i].value)||1;
let roi=parseFloat(rois[i].value)||0;

let dep=price/life;
yearly += dep + (dep*roi/100);
});

let days=document.getElementById('assetDays').value||1;
let hours=document.getElementById('assetHours').value||1;

let monthly=yearly/12;
let daily=monthly/days;
let hourly=daily/hours;

document.getElementById('assetResult').innerText =
`سنوياً: ${yearly.toFixed(2)}
شهرياً: ${monthly.toFixed(2)}
يومياً: ${daily.toFixed(2)}
ساعة: ${hourly.toFixed(2)}`;

return hourly;
}

function addExpense(){
let div=document.createElement('div');
div.className='card';
div.innerHTML=`اسم <input>
قيمة <input type='number' class='exp'>
<button class='delete' onclick='this.parentElement.remove();calcExpenses()'>حذف</button>`;
document.getElementById('expenses').appendChild(div)
}

function calcExpenses(){
let exps=document.querySelectorAll('.exp');
let total=0;
exps.forEach(e=>total+=parseFloat(e.value)||0);

let days=document.getElementById('expDays').value||1;
let hours=document.getElementById('expHours').value||1;

let hourly=total/(days*hours);

document.getElementById('expenseResult').innerText =
`الإجمالي: ${total.toFixed(2)}
ساعة: ${hourly.toFixed(2)}`;

return hourly;
}

function addService(){
let div=document.createElement('div');
div.className='card';
div.innerHTML=`اسم الخدمة <input class='name'>
المواد <input type='number' class='mat'>
الساعات <input type='number' class='time'>
ربح % <input type='number' class='profit'>
<button class='delete' onclick='this.parentElement.remove();calcServices()'>حذف</button>`;
document.getElementById('services').appendChild(div)
}

function calcServices(){
let names=document.querySelectorAll('.name');
let mats=document.querySelectorAll('.mat');
let times=document.querySelectorAll('.time');
let profits=document.querySelectorAll('.profit');

let assetH=calcAssets();
let expH=calcExpenses();

window.reportData=[];

let text='';

mats.forEach((m,i)=>{
let mat=parseFloat(m.value)||0;
let time=parseFloat(times[i].value)||0;
let profit=parseFloat(profits[i].value)||0;

let base=mat+(time*(assetH+expH));
let final=base+(base*profit/100);

let name=names[i].value||`خدمة ${i+1}`;

window.reportData.push({name,base,final});

text += `${name}
تكلفة: ${base.toFixed(2)}
سعر: ${final.toFixed(2)}

----------------\n`;
});

document.getElementById('serviceResult').innerText=text;
}

function generatePDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let y=10;

doc.text("Dental Report",10,y);
y+=10;

(window.reportData||[]).forEach(s=>{
doc.text(s.name,10,y); y+=6;
doc.text("Cost: "+s.base.toFixed(2),10,y); y+=6;
doc.text("Final: "+s.final.toFixed(2),10,y); y+=10;
});

doc.save("report.pdf");
}

setInterval(()=>{
calcAssets();
calcExpenses();
calcServices();
},2000);
</script>

</body>
</html>
